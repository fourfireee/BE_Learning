# Nginx 作为网关 / 负载均衡器。
# 对应文档：BE/14-集群负载均衡与网关.md

# upstream：定义一组后端实例。Nginx 默认用轮询(round robin)在它们之间分发请求。
# app1/app2/app3 是 docker-compose 里的服务名，Docker 内置 DNS 会解析成各容器 IP。
upstream app_backend {
    server app1:8000;
    server app2:8000;
    server app3:8000;
}

server {
    listen 80;

    # 把 /api/ 开头的请求转发到上面那组实例（网关的“路由”职责）
    location /api/ {
        proxy_pass http://app_backend;
        # 把真实客户端信息透传给后端，便于日志/限流
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 网关自己的健康检查
    location /gw-health {
        return 200 "gateway ok\n";
    }
}
